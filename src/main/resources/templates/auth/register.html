<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Регистрация')}"></head>
<body>
    <div class="auth-wrapper">
        <div class="glass-card">
            <h1 class="auth-title">Активация инвайта</h1>
            <p class="auth-subtitle">Регистрация в системе Otklik</p>

            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <form th:action="@{/register}" th:object="${registrationRequest}" method="post">
                <div class="form-group">
                    <label for="inviteCode" class="form-label">Инвайт-код</label>
                    <input type="text" id="inviteCode" th:field="*{inviteCode}" class="form-control" required autofocus placeholder="ХХХ-ХХХ-ХХХ">
                    <span class="error-text" th:if="${#fields.hasErrors('inviteCode')}" th:errors="*{inviteCode}"></span>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Имя пользователя</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required>
                    <span class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email (опционально)</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control">
                    <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required>
                    <span class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                </div>
                
                <button type="submit" class="btn mt-2">Зарегистрироваться</button>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>
</body>
</html>
